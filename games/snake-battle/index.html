<script>
  const battleCanvas = document.getElementById('gameCanvas');
  const battleCtx = battleCanvas.getContext('2d');
  
  const GRID_SIZE = 20;
  const TILE_COUNT = battleCanvas.width / GRID_SIZE;
  
  let playerSnake = [];
  let aiSnake = [];
  let foods = [];
  let playerDirection = { x: 1, y: 0 };
  let playerNextDirection = { x: 1, y: 0 };
  let aiDirection = { x: -1, y: 0 };
  let playerScore = 0;
  let aiScore = 0;
  let gameLoop = null;
  let isPaused = false;
  let gameSpeed = 120;
  
  function initGame() {
    playerSnake = [
      { x: 5, y: Math.floor(TILE_COUNT / 2) },
      { x: 4, y: Math.floor(TILE_COUNT / 2) },
      { x: 3, y: Math.floor(TILE_COUNT / 2) }
    ];
    
    aiSnake = [
      { x: TILE_COUNT - 6, y: Math.floor(TILE_COUNT / 2) },
      { x: TILE_COUNT - 5, y: Math.floor(TILE_COUNT / 2) },
      { x: TILE_COUNT - 4, y: Math.floor(TILE_COUNT / 2) }
    ];
    
    playerDirection = { x: 1, y: 0 };
    playerNextDirection = { x: 1, y: 0 };
    aiDirection = { x: -1, y: 0 };
    playerScore = 0;
    aiScore = 0;
    gameSpeed = 120;
    
    document.getElementById('score').textContent = playerScore;
    document.getElementById('aiScore').textContent = aiScore;
    
    foods = [];
    for (let i = 0; i < 3; i++) {
      generateFood();
    }
  }
  
  function generateFood() {
    let food;
    let attempts = 0;
    do {
      food = {
        x: Math.floor(Math.random() * TILE_COUNT),
        y: Math.floor(Math.random() * TILE_COUNT)
      };
      attempts++;
    } while (isOccupied(food) && attempts < 100);
    
    if (attempts < 100) {
      foods.push(food);
    }
  }
  
  function isOccupied(pos) {
    for (let segment of playerSnake) {
      if (segment.x === pos.x && segment.y === pos.y) return true;
    }
    for (let segment of aiSnake) {
      if (segment.x === pos.x && segment.y === pos.y) return true;
    }
    for (let food of foods) {
      if (food.x === pos.x && food.y === pos.y) return true;
    }
    return false;
  }
  
  function draw() {
    battleCtx.fillStyle = '#1a1a2e';
    battleCtx.fillRect(0, 0, battleCanvas.width, battleCanvas.height);
    
    battleCtx.strokeStyle = '#2a2a4e';
    battleCtx.lineWidth = 0.5;
    for (let i = 0; i <= TILE_COUNT; i++) {
      battleCtx.beginPath();
      battleCtx.moveTo(i * GRID_SIZE, 0);
      battleCtx.lineTo(i * GRID_SIZE, battleCanvas.height);
      battleCtx.stroke();
      battleCtx.beginPath();
      battleCtx.moveTo(0, i * GRID_SIZE);
      battleCtx.lineTo(battleCanvas.width, i * GRID_SIZE);
      battleCtx.stroke();
    }
    
    playerSnake.forEach((segment, index) => {
      battleCtx.fillStyle = index === 0 ? '#2ecc71' : '#27ae60';
      battleCtx.fillRect(
        segment.x * GRID_SIZE + 1,
        segment.y * GRID_SIZE + 1,
        GRID_SIZE - 2,
        GRID_SIZE - 2
      );
    });
    
    aiSnake.forEach((segment, index) => {
      battleCtx.fillStyle = index === 0 ? '#e74c3c' : '#c0392b';
      battleCtx.fillRect(
        segment.x * GRID_SIZE + 1,
        segment.y * GRID_SIZE + 1,
        GRID_SIZE - 2,
        GRID_SIZE - 2
      );
    });
    
    battleCtx.fillStyle = '#f1c40f';
    foods.forEach(food => {
      battleCtx.beginPath();
      battleCtx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 2 - 2,
        0,
        Math.PI * 2
      );
      battleCtx.fill();
    });
  }
  
  function getAIDirection() {
    const head = aiSnake[0];
    let bestDirection = aiDirection;
    let bestScore = -Infinity;
    
    const directions = [
      { x: 0, y: -1 },
      { x: 0, y: 1 },
      { x: -1, y: 0 },
      { x: 1, y: 0 }
    ];
    
    for (let dir of directions) {
      if (dir.x === -aiDirection.x && dir.y === -aiDirection.y) continue;
      
      const newX = head.x + dir.x;
      const newY = head.y + dir.y;
      
      if (newX < 0 || newX >= TILE_COUNT || newY < 0 || newY >= TILE_COUNT) continue;
      
      let collision = false;
      for (let i = 0; i < aiSnake.length - 1; i++) {
        if (aiSnake[i].x === newX && aiSnake[i].y === newY) {
          collision = true;
          break;
        }
      }
      for (let segment of playerSnake) {
        if (segment.x === newX && segment.y === newY) {
          collision = true;
          break;
        }
      }
      
      if (collision) continue;
      
      let score = 0;
      
      let minDist = Infinity;
      for (let food of foods) {
        const dist = Math.abs(food.x - newX) + Math.abs(food.y - newY);
        minDist = Math.min(minDist, dist);
      }
      score = -minDist;
      
      let spaceCount = 0;
      for (let dx = -3; dx <= 3; dx++) {
        for (let dy = -3; dy <= 3; dy++) {
          const checkX = newX + dx;
          const checkY = newY + dy;
          if (checkX >= 0 && checkX < TILE_COUNT && checkY >= 0 && checkY < TILE_COUNT) {
            let occupied = false;
            for (let segment of aiSnake) {
              if (segment.x === checkX && segment.y === checkY) {
                occupied = true;
                break;
              }
            }
            for (let segment of playerSnake) {
              if (segment.x === checkX && segment.y === checkY) {
                occupied = true;
                break;
              }
            }
            if (!occupied) spaceCount++;
          }
        }
      }
      score += spaceCount * 0.5;
      
      if (score > bestScore) {
        bestScore = score;
        bestDirection = dir;
      }
    }
    
    return bestDirection;
  }
  
  function update() {
    playerDirection = { ...playerNextDirection };
    aiDirection = getAIDirection();
    
    const playerHead = {
      x: playerSnake[0].x + playerDirection.x,
      y: playerSnake[0].y + playerDirection.y
    };
    
    const aiHead = {
      x: aiSnake[0].x + aiDirection.x,
      y: aiSnake[0].y + aiDirection.y
    };
    
    let playerDead = false;
    let aiDead = false;
    
    if (playerHead.x < 0 || playerHead.x >= TILE_COUNT || 
        playerHead.y < 0 || playerHead.y >= TILE_COUNT) {
      playerDead = true;
    }
    
    if (aiHead.x < 0 || aiHead.x >= TILE_COUNT || 
        aiHead.y < 0 || aiHead.y >= TILE_COUNT) {
      aiDead = true;
    }
    
    for (let i = 0; i < playerSnake.length; i++) {
      if (playerHead.x === playerSnake[i].x && playerHead.y === playerSnake[i].y) {
        playerDead = true;
      }
    }
    
    for (let i = 0; i < aiSnake.length; i++) {
      if (playerHead.x === aiSnake[i].x && playerHead.y === aiSnake[i].y) {
        playerDead = true;
      }
    }
    
    for (let i = 0; i < aiSnake.length; i++) {
      if (aiHead.x === aiSnake[i].x && aiHead.y === aiSnake[i].y) {
        aiDead = true;
      }
    }
    
    for (let segment of playerSnake) {
      if (aiHead.x === segment.x && aiHead.y === segment.y) {
        aiDead = true;
      }
    }
    
    if (playerHead.x === aiHead.x && playerHead.y === aiHead.y) {
      playerDead = true;
      aiDead = true;
    }
    
    if (playerDead || aiDead) {
      gameOver(playerDead, aiDead);
      return;
    }
    
    playerSnake.unshift(playerHead);
    aiSnake.unshift(aiHead);
    
    let playerAte = false;
    let aiAte = false;
    
    for (let i = foods.length - 1; i >= 0; i--) {
      if (playerHead.x === foods[i].x && playerHead.y === foods[i].y) {
        playerScore += 10;
        document.getElementById('score').textContent = playerScore;
        foods.splice(i, 1);
        generateFood();
        playerAte = true;
      } else if (aiHead.x === foods[i].x && aiHead.y === foods[i].y) {
        aiScore += 10;
        document.getElementById('aiScore').textContent = aiScore;
        foods.splice(i, 1);
        generateFood();
        aiAte = true;
      }
    }
    
    if (!playerAte) {
      playerSnake.pop();
    }
    
    if (!aiAte) {
      aiSnake.pop();
    }
  }
  
  function gameStep() {
    if (!isPaused) {
      update();
      draw();
    }
  }
  
  function startGame() {
    initGame();
    document.getElementById('startBtn').disabled = true;
    document.getElementById('pauseBtn').disabled = false;
    document.getElementById('gameOver').classList.add('hidden');
    
    if (gameLoop) {
      clearInterval(gameLoop);
    }
    
    draw();
    gameLoop = setInterval(gameStep, gameSpeed);
  }
  
  function togglePause() {
    isPaused = !isPaused;
    document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
  }
  
  function gameOver(playerDead, aiDead) {
    clearInterval(gameLoop);
    gameLoop = null;
    
    let resultText = '';
    if (playerDead && aiDead) {
      resultText = '平局!';
    } else if (playerDead) {
      resultText = 'AI获胜!';
    } else {
      resultText = '你赢了!';
    }
    
    document.getElementById('resultText').textContent = resultText;
    document.getElementById('finalScoreText').textContent = 
      `你的得分: ${playerScore} | AI得分: ${aiScore}`;
    document.getElementById('gameOver').classList.remove('hidden');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('pauseBtn').disabled = true;
  }
  
  function restartGame() {
    startGame();
  }
  
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (gameLoop) {
        togglePause();
      }
      return;
    }
    
    if (isPaused) return;
    
    switch(e.key) {
      case 'ArrowUp':
      case 'w':
      case 'W':
        if (playerDirection.y !== 1) {
          playerNextDirection = { x: 0, y: -1 };
        }
        break;
      case 'ArrowDown':
      case 's':
      case 'S':
        if (playerDirection.y !== -1) {
          playerNextDirection = { x: 0, y: 1 };
        }
        break;
      case 'ArrowLeft':
      case 'a':
      case 'A':
        if (playerDirection.x !== 1) {
          playerNextDirection = { x: -1, y: 0 };
        }
        break;
      case 'ArrowRight':
      case 'd':
      case 'D':
        if (playerDirection.x !== -1) {
          playerNextDirection = { x: 1, y: 0 };
        }
        break;
    }
  });
  
  initGame();
  draw();
</script>

  function RunItem() {
    this.list = []; // 存放回调函数
    this.start = () => {
      for (var i = 0; i < this.list.length; i++) {
        this.list[i].run();
      }
    };
    this.push = (fn, name, setRequestAnimationFrame = true) => {
      let myfn = fn
      if (setRequestAnimationFrame) {
        myfn = () => {
          utils.requestAnimationFrame(fn)
        }
      }
      var f = new Item(myfn, name);
      this.list.push(f);
    };
    this.remove = (name) => {
      for (let index = 0; index < this.list.length; index++) {
        const e = this.list[index];
        if (e.name == name) {
          this.list.splice(index, 1);
        }
      }
    }
    // 构造一个可以run的对象
    function Item(fn, name) {
      // 函数名称
      this.name = name || fn.name;
      // run方法
      this.run = () => {
        try {
          fn()
        } catch (error) {
          console.log(error);
        }
      };
    }
  }

  const utils = {
    // 懒加载 css https://github.com/filamentgroup/loadCSS
    css: (href, before, media, attributes) => {
      var doc = window.document;
      var ss = doc.createElement("link");
      var ref;
      if (before) {
        ref = before;
      } else {
        var refs = (doc.body || doc.getElementsByTagName("head")[0]).childNodes;
        ref = refs[refs.length - 1];
      }
      var sheets = doc.styleSheets;
      if (attributes) {
        for (var attributeName in attributes) {
          if (attributes.hasOwnProperty(attributeName)) {
            ss.setAttribute(attributeName, attributes[attributeName]);
          }
        }
      }
      ss.rel = "stylesheet";
      ss.href = href;
      ss.media = "only x";
      function ready(cb) {
        if (doc.body) {
          return cb();
        }
        setTimeout(function () {
          ready(cb);
        });
      }
      ready(function () {
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
      });
      var onloadcssdefined = function (cb) {
        var resolvedHref = ss.href;
        var i = sheets.length;
        while (i--) {
          if (sheets[i].href === resolvedHref) {
            return cb();
          }
        }
        setTimeout(function () {
          onloadcssdefined(cb);
        });
      };
      function loadCB() {
        if (ss.addEventListener) {
          ss.removeEventListener("load", loadCB);
        }
        ss.media = media || "all";
      }
      if (ss.addEventListener) {
        ss.addEventListener("load", loadCB);
      }
      ss.onloadcssdefined = onloadcssdefined;

    request: (el, url, callback, onFailure) => {
      const maxRetry = 3;
      let retryCount = 0;

      return new Promise((resolve, reject) => {
        const load = () => {
          utils.onLoading?.(el);

          let timedOut = false;
          const timeout = setTimeout(() => {
            timedOut = true;
            console.warn('[request] 超时:', url);

            if (++retryCount >= maxRetry) {
              utils.onLoadFailure?.(el);
              onFailure?.();
              reject('请求超时');
            } else {
              setTimeout(load, 1000);
            }
          }, 5000);

          fetch(url).then(resp => {
            if (timedOut) return;
            clearTimeout(timeout);

            if (!resp.ok) throw new Error('响应失败');
            return resp;
          }).then(data => {
            if (timedOut) return;
            utils.onLoadSuccess?.(el);
            callback(data);
            resolve(data);
          }).catch(err => {
            clearTimeout(timeout);
            console.warn('[request] 错误:', err);

            if (++retryCount >= maxRetry) {
              utils.onLoadFailure?.(el);
              onFailure?.();
              reject(err);
            } else {
              setTimeout(load, 1000);
            }
          });
        };

        load();
      });
    },
    requestWithoutLoading: (url, options = {}, maxRetry = 2, timeout = 5000) => {
      return new Promise((resolve, reject) => {
        let retryCount = 0;

        const tryRequest = () => {
          let timedOut = false;
          const timer = setTimeout(() => {
            timedOut = true;
            if (++retryCount > maxRetry) reject('timeout');
            else tryRequest();
          }, timeout);

          fetch(url, options)
            .then(resp => {
              clearTimeout(timer);
              if (!resp.ok) throw new Error('bad response');
              resolve(resp);
            })
            .catch(err => {
              clearTimeout(timer);
              if (++retryCount > maxRetry) reject(err);
              else setTimeout(tryRequest, 500);
            });

        tryRequest();

    // 2、在隐藏或不可见的元素中，requestAnimationFrame 将不会进行重绘或回流，这当然就意味着更少的的 cpu，gpu 和内存使用量。
    requestAnimationFrame: (fn) => {

    }
  };
  // Listen to the initialization event

  window.addEventListener(
    "LazyLoad::Initialized",
    function (event) {
      window.lazyLoadInstance = event.detail.instance;
    },
    false
  );
  document.addEventListener('DOMContentLoaded', function () {
    window.lazyLoadInstance?.update();
  });

  window.wrapLazyloadImages = (container) => {
    if (typeof container === 'string') {
      container = document.querySelector(container);
    }
    if (!container) return;
    
    const images = container.querySelectorAll('img');
    images.forEach((img) => {
      if (img.classList.contains('lazy')) return;

      const src = img.getAttribute('src');
      if (!src) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'lazy-box';

      const newImg = img.cloneNode();
      newImg.removeAttribute('src');
      newImg.setAttribute('data-src', src);
      newImg.classList.add('lazy');

      const icon = document.createElement('div');
      icon.className = 'lazy-icon';
      if (def.loading) {
        icon.style.backgroundImage = `url("${def.loading}")`;
      }

      wrapper.appendChild(newImg);
      wrapper.appendChild(icon);

      img.replaceWith(wrapper);
    });

    // 通知 LazyLoad 更新
    if (window.lazyLoadInstance?.update) {
      window.lazyLoadInstance.update();
    }
  }

        if (ctx.videos?.length > 0) {
          utils.js(js, { defer: true }).then(function () {
            videoEvents(ctx.videos);
          });
        }
      } else if (id == 'download-file') {
        ctx.files = document.querySelectorAll('.file');
        if (ctx.files?.length > 0) {
          utils.js(js, { defer: true }).then(function () {
            downloadFileEvent(ctx.files);
          });
        }
      } else {
        const els = document.getElementsByClassName(`ds-${id}`);
        if (els?.length > 0) {
          utils.jq(() => {
            if (id == 'timeline' || 'memos' || 'marked') {
              utils.js(deps.marked).then(function () {
                utils.js(js, { defer: true });
              });
            } else {
              utils.js(js, { defer: true });
            }
          });
        }
      }
    }

    // chat iphone time
    let phoneTimes = document.querySelectorAll('.chat .status-bar .time');

    if (phoneTimes.length > 0) {
      NowTime();
      var date = new Date();
      var sec = date.getSeconds();
      var firstAdjustInterval = setInterval(firstAdjustTime, 1000 * (60 - sec));
    }

    function firstAdjustTime() {
      NowTime();
      clearInterval(firstAdjustInterval);
      setInterval(NowTime, 1000 * 60);
    }

    function NowTime() {
      for (let i = 0; i < phoneTimes.length; ++i) {
        var timeSpan = phoneTimes[i];
        var date = new Date();
        var hour = date.getHours();
        var min = date.getMinutes();
        timeSpan.innerHTML = check(hour) + ":" + check(min);
      }
    };

    function check(val) {
      if (val < 10) {
        return ("0" + val);
      }
      return (val);
    }

    // chat quote
    const chat_quote_obverser = new IntersectionObserver((entries, observer) => {
      entries.filter((entry) => { return entry.isIntersecting }).sort((a, b) => a.intersectionRect.y !== b.intersectionRect.y ? a.intersectionRect.y - b.intersectionRect.y : a.intersectionRect.x - b.intersectionRect.x).forEach((entry, index) => {
          observer.unobserve(entry.target);
          setTimeout(() => {
            entry.target.classList.add('quote-blink');
            setTimeout(() => {
              entry.target.classList.remove('quote-blink');
            }, 1000);
          }, Math.max(100, 16) * (index + 1));
        });
    });

    var chatQuotes = document.querySelectorAll(".chat .talk .quote");
    chatQuotes.forEach((quote) => {
      quote.addEventListener('click', function () {
        var chatCellDom = document.getElementById("quote-" + quote.getAttribute("quotedCellTag"));
        if (chatCellDom) {
          var chatDiv = chatCellDom.parentElement;
          var mid = chatDiv.clientHeight / 2;
          var offsetTop = chatCellDom.offsetTop;
          if (offsetTop > mid - chatCellDom.clientHeight / 2) {
            chatDiv.scrollTo({
              top: chatCellDom.offsetTop - mid + chatCellDom.clientHeight / 2,
              behavior: "smooth"
            });
          } else {
            chatDiv.scrollTo({
              top: 0,
              behavior: "smooth"
            });
          }
          chat_quote_obverser.observe(chatCellDom);
        }
      });
    });
  });
</script>

<!-- 点击特效 -->
<script>
(function() {
  var clickEffects = {
    current: null,
    
    init: function() {
      this.current = localStorage.getItem('clickEffect') || 'none';
      this.bindEvents();
    },
    
    bindEvents: function() {
      var self = this;
      document.addEventListener('click', function(e) {
        if (self.current === 'none') return;
        if (e.target.closest('button, a, input, textarea, select, .post-card, .layout-btn')) return;
        self.createEffect(e.clientX, e.clientY);
      });
      
      window.addEventListener('storage', function(e) {
        if (e.key === 'clickEffect') {
          self.current = e.newValue || 'none';
        }
      });
    },
    
    createEffect: function(x, y) {
      switch(this.current) {
        case 'ripple': this.createRipple(x, y); break;
        case 'firework': this.createFirework(x, y); break;
        case 'particles': this.createParticles(x, y); break;
        case 'text': this.createText(x, y); break;
        default: break;
      }
    },
    
    createRipple: function(x, y) {
      var ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.cssText = 'position:fixed;left:' + x + 'px;top:' + y + 'px;width:0;height:0;border-radius:50%;background:rgba(52,152,219,0.4);transform:translate(-50%,-50%);pointer-events:none;z-index:9999;animation:rippleExpand 0.6s ease-out forwards;';
      document.body.appendChild(ripple);
      setTimeout(function() { ripple.remove(); }, 600);
    },
    
    createFirework: function(x, y) {
      var colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
      for (var i = 0; i < 12; i++) {
        var particle = document.createElement('div');
        var angle = (Math.PI * 2 / 12) * i;
        var velocity = 50 + Math.random() * 30;
        particle.style.cssText = 'position:fixed;left:' + x + 'px;top:' + y + 'px;width:6px;height:6px;border-radius:50%;background:' + colors[i % 5] + ';pointer-events:none;z-index:9999;transform:translate(-50%,-50%);';
        document.body.appendChild(particle);
        this.animateParticle(particle, x, y, x + Math.cos(angle) * velocity, y + Math.sin(angle) * velocity, 500);
      }
    },
    
    createParticles: function(x, y) {
      var colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd'];
      for (var i = 0; i < 8; i++) {
        var particle = document.createElement('div');
        particle.innerHTML = '✨';
        particle.style.cssText = 'position:fixed;left:' + (x + (Math.random()-0.5)*30) + 'px;top:' + (y + (Math.random()-0.5)*30) + 'px;font-size:16px;pointer-events:none;z-index:9999;animation:particleFloat 0.8s ease-out forwards;';
        document.body.appendChild(particle);
        setTimeout(function(p) { return function() { p.remove(); }; }(particle), 800);
      }
    },
    
    createText: function(x, y) {
      var texts = ['666', '厉害', 'nice', '棒', '赞', '给力'];
      var text = document.createElement('div');
      text.innerHTML = texts[Math.floor(Math.random() * texts.length)];
      text.style.cssText = 'position:fixed;left:' + x + 'px;top:' + y + 'px;font-size:18px;font-weight:bold;color:#3498db;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);animation:textFloat 0.8s ease-out forwards;';
      document.body.appendChild(text);
      setTimeout(function() { text.remove(); }, 800);
    },
    
    animateParticle: function(el, startX, startY, endX, endY, duration) {
      var startTime = performance.now();
      function animate(currentTime) {
        var progress = Math.min((currentTime - startTime) / duration, 1);
        var easeOut = 1 - Math.pow(1 - progress, 3);
        el.style.left = (startX + (endX - startX) * easeOut) + 'px';
        el.style.top = (startY + (endY - startY) * easeOut) + 'px';
        el.style.opacity = 1 - progress;
        if (progress < 1) requestAnimationFrame(animate);
        else el.remove();
      }
      requestAnimationFrame(animate);
    }
  };
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { clickEffects.init(); });
  } else {
    clickEffects.init();
  }
  
  window.ClickEffects = clickEffects;
})();
</script>

<style>

  100% { width: 100px; height: 100px; opacity: 0; }

@keyframes particleFloat {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(0.5); }
}

}
