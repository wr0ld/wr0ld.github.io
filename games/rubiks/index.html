<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script>
(function() {
  'use strict';
  
  var rotateCount = 0;
  var gameStartTime = Date.now();
  var timerInterval = null;
  
  window.RubiksGame = {
    scene: null,
    camera: null,
    renderer: null,
    cubes: [],
    cubeGroup: null,
    container: null,
    isAnimating: false,
    raycaster: null,
    mouse: null,
    
    isDragging: false,
    isRotatingLayer: false,
    selectedFace: null,
    selectedCube: null,
    dragStart: { x: 0, y: 0 },
    layerCubes: [],
    rotationAxis: null,
    rotationLayer: null,
    rotationDirection: null,
    pivot: null,
    
    initialized: false,
    
    init: function() {
      if (this.initialized) return;
      this.initialized = true;
      
      this.container = document.getElementById('rubiks-game-canvas');
      if (!this.container) return;
      
      this.raycaster = new THREE.Raycaster();
      this.mouse = new THREE.Vector2();
      
      try {
        this.createScene();
        this.createCamera();
        this.createRenderer();
        this.createLights();
        this.createRubiksCube();
        this.bindEvents();
        this.animate();
        this.startTimer();
      } catch(e) {
        console.error('RubiksGame init error:', e);
      }
    },
    
    createScene: function() {
      this.scene = new THREE.Scene();
    },
    
    createCamera: function() {
      var width = this.container.offsetWidth || 400;
      var height = this.container.offsetHeight || 450;
      this.camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
      this.camera.position.set(6, 6, 6);
      this.camera.lookAt(0, 0, 0);
    },
    
    createRenderer: function() {
      this.renderer = new THREE.WebGLRenderer({ 
        alpha: true, 
        antialias: true 
      });
      var width = this.container.offsetWidth || 400;
      var height = this.container.offsetHeight || 450;
      this.renderer.setSize(width, height);
      this.renderer.setClearColor(0x000000, 0);
      this.container.appendChild(this.renderer.domElement);
    },
    
    createLights: function() {
      var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      this.scene.add(ambientLight);
      
      var directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 5, 5);
      this.scene.add(directionalLight);
      
      var directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
      directionalLight2.position.set(-5, -5, -5);
      this.scene.add(directionalLight2);
    },
    
    createRubiksCube: function() {
      var size = 0.95;
      var gap = 0.05;
      var totalSize = size + gap;
      
      var colors = {
        front: 0xff0000,
        back: 0xff8c00,
        top: 0xffffff,
        bottom: 0xffff00,
        right: 0x0000ff,
        left: 0x00ff00
      };
      
      this.cubeGroup = new THREE.Group();
      this.cubes = [];
      
      for (var x = -1; x <= 1; x++) {
        for (var y = -1; y <= 1; y++) {
          for (var z = -1; z <= 1; z++) {
            var geometry = new THREE.BoxGeometry(size, size, size);
            
            var materials = [
              new THREE.MeshPhongMaterial({ color: x === 1 ? colors.right : 0x1a1a1a }),
              new THREE.MeshPhongMaterial({ color: x === -1 ? colors.left : 0x1a1a1a }),
              new THREE.MeshPhongMaterial({ color: y === 1 ? colors.top : 0x1a1a1a }),
              new THREE.MeshPhongMaterial({ color: y === -1 ? colors.bottom : 0x1a1a1a }),
              new THREE.MeshPhongMaterial({ color: z === 1 ? colors.front : 0x1a1a1a }),
              new THREE.MeshPhongMaterial({ color: z === -1 ? colors.back : 0x1a1a1a })
            ];
            
            var cube = new THREE.Mesh(geometry, materials);
            cube.position.set(x * totalSize, y * totalSize, z * totalSize);
            
            this.cubeGroup.add(cube);
            this.cubes.push(cube);
          }
        }
      }
      
      this.scene.add(this.cubeGroup);
    },
    
    bindEvents: function() {
      var self = this;
      var canvas = this.renderer.domElement;
      
      canvas.addEventListener('mousedown', function(e) {
        self.onPointerDown(e.clientX, e.clientY);
      });
      
      window.addEventListener('mousemove', function(e) {
        self.onPointerMove(e.clientX, e.clientY);
      });
      
      window.addEventListener('mouseup', function(e) {
        self.onPointerUp();
      });
      
      canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        var touch = e.touches[0];
        self.onPointerDown(touch.clientX, touch.clientY);
      }, { passive: false });
      
      canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        var touch = e.touches[0];
        self.onPointerMove(touch.clientX, touch.clientY);
      }, { passive: false });
      
      canvas.addEventListener('touchend', function(e) {
        self.onPointerUp();
      });
      
      window.addEventListener('resize', function() {
        if (self.container && self.renderer && self.camera) {
          var width = self.container.offsetWidth || 400;
          var height = self.container.offsetHeight || 450;
          self.camera.aspect = width / height;
          self.camera.updateProjectionMatrix();
          self.renderer.setSize(width, height);
        }
      });
    },
    
    onPointerDown: function(clientX, clientY) {
      if (this.isAnimating) return;
      
      var rect = this.container.getBoundingClientRect();
      this.mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      this.mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      
      this.raycaster.setFromCamera(this.mouse, this.camera);
      var intersects = this.raycaster.intersectObjects(this.cubes);
      
      this.dragStart.x = clientX;
      this.dragStart.y = clientY;
      
      if (intersects.length > 0) {
        this.isRotatingLayer = true;
        this.selectedCube = intersects[0].object;
        this.selectedFace = intersects[0].face;
      } else {
        this.isRotatingLayer = false;
      }
      
      this.isDragging = true;
    },
    
    onPointerMove: function(clientX, clientY) {
      if (!this.isDragging || this.isAnimating) return;
      
      var deltaX = clientX - this.dragStart.x;
      var deltaY = clientY - this.dragStart.y;
      
      if (this.isRotatingLayer && this.selectedCube && this.selectedFace) {
        if (Math.abs(deltaX) > 20 || Math.abs(deltaY) > 20) {
          this.isRotatingLayer = false;
          this.selectedCube = null;
          this.selectedFace = null;
          this.startLayerRotation(deltaX, deltaY);
        }
      } else {
        this.cubeGroup.rotation.y += deltaX * 0.01;
        this.cubeGroup.rotation.x += deltaY * 0.01;
        this.dragStart.x = clientX;
        this.dragStart.y = clientY;
      }
    },
    
    onPointerUp: function() {
      this.isDragging = false;
      this.isRotatingLayer = false;
      this.selectedCube = null;
      this.selectedFace = null;
    },
    
    startLayerRotation: function(deltaX, deltaY) {
      if (this.isAnimating) return;
      
      var face = this.selectedFace;
      var cube = this.selectedCube;
      
      var faceNormal = face.normal.clone();
      faceNormal.applyQuaternion(cube.quaternion);
      
      var worldPos = new THREE.Vector3();
      cube.getWorldPosition(worldPos);
      
      var cubePos = {
        x: Math.round(worldPos.x),
        y: Math.round(worldPos.y),
        z: Math.round(worldPos.z)
      };
      
      var axis, layer, direction;
      
      if (Math.abs(faceNormal.x) > 0.9) {
        layer = cubePos.x;
        if (Math.abs(deltaY) > Math.abs(deltaX)) {
          axis = 'z';
          direction = deltaY > 0 ? -1 : 1;
          if (layer > 0) direction *= -1;
        } else {
          axis = 'y';
          direction = deltaX > 0 ? 1 : -1;
          if (layer > 0) direction *= -1;
        }
      } else if (Math.abs(faceNormal.y) > 0.9) {
        layer = cubePos.y;
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
          axis = 'z';
          direction = deltaX > 0 ? 1 : -1;
          if (layer < 0) direction *= -1;
        } else {
          axis = 'x';
          direction = deltaY > 0 ? -1 : 1;
          if (layer < 0) direction *= -1;
        }
      } else {
        layer = cubePos.z;
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
          axis = 'y';
          direction = deltaX > 0 ? 1 : -1;
          if (layer > 0) direction *= -1;
        } else {
          axis = 'x';
          direction = deltaY > 0 ? 1 : -1;
          if (layer > 0) direction *= -1;
        }
      }
      
      this.executeRotation(axis, layer, direction);
    },
    
    executeRotation: function(axis, layer, direction) {
      this.isAnimating = true;
      var self = this;
      
      rotateCount++;
      document.getElementById('rotateCount').textContent = rotateCount;
      
      this.pivot = new THREE.Group();
      this.cubeGroup.add(this.pivot);
      
      this.layerCubes = [];
      var threshold = 0.5;
      
      this.cubes.forEach(function(cube) {
        var pos = cube.position;
        var coord;
        
        if (axis === 'x') coord = pos.x;
        else if (axis === 'y') coord = pos.y;
        else coord = pos.z;
        
        if (Math.abs(coord - layer) < threshold) {
          self.layerCubes.push(cube);
        }
      });
      
      this.layerCubes.forEach(function(cube) {
        self.pivot.attach(cube);
      });
      
      var targetRotation = Math.PI / 2 * direction;
      var currentRotation = 0;
      var rotationSpeed = 0.2;
      
      function animateRotation() {
        if (currentRotation >= Math.abs(targetRotation)) {
          self.layerCubes.forEach(function(cube) {
            self.cubeGroup.attach(cube);
          });
          
          self.cubeGroup.remove(self.pivot);
          self.normalizeCubePositions();
          self.isAnimating = false;
          
          if (self.checkSolved()) {
            setTimeout(function() {
              alert('🎉 恭喜你还原了魔方！');
            }, 100);
          }
          return;
        }
        
        var step = Math.min(rotationSpeed, Math.abs(targetRotation) - currentRotation);
        currentRotation += step;
        
        if (axis === 'x') self.pivot.rotation.x = currentRotation * direction;
        else if (axis === 'y') self.pivot.rotation.y = currentRotation * direction;
        else self.pivot.rotation.z = currentRotation * direction;
        
        requestAnimationFrame(animateRotation);
      }
      
      animateRotation();
    },
    
    normalizeCubePositions: function() {
      var totalSize = 1.0;
      
      this.cubes.forEach(function(cube) {
        cube.position.x = Math.round(cube.position.x / totalSize) * totalSize;
        cube.position.y = Math.round(cube.position.y / totalSize) * totalSize;
        cube.position.z = Math.round(cube.position.z / totalSize) * totalSize;
        
        cube.rotation.x = Math.round(cube.rotation.x / (Math.PI / 2)) * (Math.PI / 2);
        cube.rotation.y = Math.round(cube.rotation.y / (Math.PI / 2)) * (Math.PI / 2);
        cube.rotation.z = Math.round(cube.rotation.z / (Math.PI / 2)) * (Math.PI / 2);
      });
    },
    
    checkSolved: function() {
      var colors = {
        front: 0xff0000,
        back: 0xff8c00,
        top: 0xffffff,
        bottom: 0xffff00,
        right: 0x0000ff,
        left: 0x00ff00
      };
      
      var faces = [
        { axis: 'z', layer: 1, materialIndex: 4, expected: colors.front },
        { axis: 'z', layer: -1, materialIndex: 5, expected: colors.back },
        { axis: 'y', layer: 1, materialIndex: 2, expected: colors.top },
        { axis: 'y', layer: -1, materialIndex: 3, expected: colors.bottom },
        { axis: 'x', layer: 1, materialIndex: 0, expected: colors.right },
        { axis: 'x', layer: -1, materialIndex: 1, expected: colors.left }
      ];
      
      for (var f = 0; f < faces.length; f++) {
        var face = faces[f];
        var faceColor = null;
        
        for (var i = 0; i < this.cubes.length; i++) {
          var cube = this.cubes[i];
          var pos = cube.position;
          var coord;
          
          if (face.axis === 'x') coord = pos.x;
          else if (face.axis === 'y') coord = pos.y;
          else coord = pos.z;
          
          if (Math.abs(coord - face.layer) < 0.5) {
            var material = cube.material[face.materialIndex];
            var color = material.color.getHex();
            
            if (faceColor === null) {
              faceColor = color;
            } else if (faceColor !== color) {
              return false;
            }
          }
        }
        
        if (faceColor !== face.expected) {
          return false;
        }
      }
      
      return true;
    },
    
    shuffle: function() {
      if (this.isAnimating) return;
      
      var self = this;
      var axes = ['x', 'y', 'z'];
      var layers = [-1, 0, 1];
      var directions = [-1, 1];
      var moves = 15;
      var currentMove = 0;
      
      function doMove() {
        if (currentMove >= moves) return;
        currentMove++;
        
        var axis = axes[Math.floor(Math.random() * 3)];
        var layer = layers[Math.floor(Math.random() * 3)];
        var direction = directions[Math.floor(Math.random() * 2)];
        
        self.executeRotation(axis, layer, direction);
        
        setTimeout(doMove, 300);
      }
      
      doMove();
    },
    
    reset: function() {
      var self = this;
      
      if (this.cubeGroup) {
        this.cubes.forEach(function(cube) {
          cube.geometry.dispose();
          cube.material.forEach(function(m) { m.dispose(); });
        });
        
        this.scene.remove(this.cubeGroup);
      }
      
      this.cubes = [];
      this.cubeGroup = null;
      this.createRubiksCube();
      
      rotateCount = 0;
      document.getElementById('rotateCount').textContent = '0';
      
      gameStartTime = Date.now();
    },
    
    animate: function() {
      var self = this;
      
      function loop() {
        requestAnimationFrame(loop);
        if (self.renderer && self.scene && self.camera) {
          self.renderer.render(self.scene, self.camera);
        }
      }
      
      loop();
    },
    
    startTimer: function() {
      var self = this;
      
      if (timerInterval) {
        clearInterval(timerInterval);
      }
      
      timerInterval = setInterval(function() {
        var elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
        var minutes = Math.floor(elapsed / 60);
        var seconds = elapsed % 60;
        
        var timeEl = document.getElementById('gameTime');
        if (timeEl) {
          timeEl.textContent = 
            (minutes < 10 ? '0' : '') + minutes + ':' + 
            (seconds < 10 ? '0' : '') + seconds;
        }
      }, 1000);
    }
  };
  
  function initGame() {
    if (window.THREE) {
      RubiksGame.init();
    } else {
      setTimeout(initGame, 100);
    }
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initGame);
  } else {
    initGame();
  }
})();
</script>

<script type="text/javascript">
  
  function RunItem() {
    this.list = []; // 存放回调函数
    this.start = () => {
      for (var i = 0; i < this.list.length; i++) {
        this.list[i].run();
      }
    };
    this.push = (fn, name, setRequestAnimationFrame = true) => {
      let myfn = fn
      if (setRequestAnimationFrame) {
        myfn = () => {
          utils.requestAnimationFrame(fn)
        }
      }
      var f = new Item(myfn, name);
      this.list.push(f);
    };
    this.remove = (name) => {
      for (let index = 0; index < this.list.length; index++) {
        const e = this.list[index];
        if (e.name == name) {
          this.list.splice(index, 1);
        }
      }
    }
    // 构造一个可以run的对象
    function Item(fn, name) {
      // 函数名称
      this.name = name || fn.name;
      // run方法
      this.run = () => {
        try {
          fn()
        } catch (error) {
          console.log(error);
        }
      };
    }
  }

  const utils = {
    // 懒加载 css https://github.com/filamentgroup/loadCSS
    css: (href, before, media, attributes) => {
      var doc = window.document;
      var ss = doc.createElement("link");
      var ref;
      if (before) {
        ref = before;
      } else {
        var refs = (doc.body || doc.getElementsByTagName("head")[0]).childNodes;
        ref = refs[refs.length - 1];
      }
      var sheets = doc.styleSheets;
      if (attributes) {
        for (var attributeName in attributes) {
          if (attributes.hasOwnProperty(attributeName)) {
            ss.setAttribute(attributeName, attributes[attributeName]);
          }
        }
      }
      ss.rel = "stylesheet";
      ss.href = href;
      ss.media = "only x";
      function ready(cb) {
        if (doc.body) {
          return cb();
        }
        setTimeout(function () {
          ready(cb);
        });
      }
      ready(function () {
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
      });
      var onloadcssdefined = function (cb) {
        var resolvedHref = ss.href;
        var i = sheets.length;
        while (i--) {
          if (sheets[i].href === resolvedHref) {
            return cb();
          }
        }
        setTimeout(function () {
          onloadcssdefined(cb);
        });
      };
      function loadCB() {
        if (ss.addEventListener) {
          ss.removeEventListener("load", loadCB);
        }
        ss.media = media || "all";
      }
      if (ss.addEventListener) {
        ss.addEventListener("load", loadCB);
      }
      ss.onloadcssdefined = onloadcssdefined;
      onloadcssdefined(loadCB);
      return ss;
    },

    js: (src, opt) => new Promise((resolve, reject) => {
      var script = document.createElement('script');
      if (src.startsWith('/')) {
        src = ctx.root + src.substring(1);
      }
      script.src = src;
      if (opt) {
        for (let key of Object.keys(opt)) {

        }
      } else {
        // 默认异步，如果需要同步，第二个参数传入 {} 即可
        script.async = true
      }
      script.onerror = reject
      script.onload = script.onreadystatechange = function () {
        const loadState = this.readyState
        if (loadState && loadState !== 'loaded' && loadState !== 'complete') return
        script.onload = script.onreadystatechange = null
        resolve()
      }
      document.head.appendChild(script)
    }),

    jq: (fn) => {

    },

    onLoading: (el) => {
      if (el) {
        $(el).append('<div class="loading-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"><path stroke-dasharray="60" stroke-dashoffset="60" stroke-opacity=".3" d="M12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3Z"><animate fill="freeze" attributeName="stroke-dashoffset" dur="1.3s" values="60;0"/></path><path stroke-dasharray="15" stroke-dashoffset="15" d="M12 3C16.9706 3 21 7.02944 21 12"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.3s" values="15;0"/><animateTransform attributeName="transform" dur="1.5s" repeatCount="indefinite" type="rotate" values="0 12 12;360 12 12"/></path></g></svg></div>');

    },
    onLoadSuccess: (el) => {

        $(el).find('.loading-wrap').remove();
      }
    },
    onLoadFailure: (el) => {
      if (el) {
        $(el).find('.loading-wrap svg').remove();
        $(el).find('.loading-wrap').append('<svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path stroke-dasharray="60" stroke-dashoffset="60" d="M12 3L21 20H3L12 3Z"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.5s" values="60;0"/></path><path stroke-dasharray="6" stroke-dashoffset="6" d="M12 10V14"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.6s" dur="0.2s" values="6;0"/></path></g><circle cx="12" cy="17" r="1" fill="currentColor" fill-opacity="0"><animate fill="freeze" attributeName="fill-opacity" begin="0.8s" dur="0.4s" values="0;1"/></circle></svg>');
        $(el).find('.loading-wrap').addClass('error');
      }
    },
    request: (el, url, callback, onFailure) => {
      const maxRetry = 3;
      let retryCount = 0;

      return new Promise((resolve, reject) => {
        const load = () => {
          utils.onLoading?.(el);

          let timedOut = false;
          const timeout = setTimeout(() => {
            timedOut = true;
            console.warn('[request] 超时:', url);

            if (++retryCount >= maxRetry) {
              utils.onLoadFailure?.(el);
              onFailure?.();
              reject('请求超时');
            } else {
              setTimeout(load, 1000);
            }
          }, 5000);

          fetch(url).then(resp => {
            if (timedOut) return;
            clearTimeout(timeout);

            if (!resp.ok) throw new Error('响应失败');
            return resp;
          }).then(data => {
            if (timedOut) return;
            utils.onLoadSuccess?.(el);
            callback(data);
            resolve(data);
          }).catch(err => {
            clearTimeout(timeout);
            console.warn('[request] 错误:', err);

            if (++retryCount >= maxRetry) {
              utils.onLoadFailure?.(el);
              onFailure?.();
              reject(err);
            } else {
              setTimeout(load, 1000);
            }
          });
        };

        load();
      });
    },
    requestWithoutLoading: (url, options = {}, maxRetry = 2, timeout = 5000) => {
      return new Promise((resolve, reject) => {
        let retryCount = 0;

        const tryRequest = () => {
          let timedOut = false;
          const timer = setTimeout(() => {
            timedOut = true;
            if (++retryCount > maxRetry) reject('timeout');
            else tryRequest();
          }, timeout);

          fetch(url, options)
            .then(resp => {
              clearTimeout(timer);
              if (!resp.ok) throw new Error('bad response');
              resolve(resp);
            })
            .catch(err => {
              clearTimeout(timer);
              if (++retryCount > maxRetry) reject(err);
              else setTimeout(tryRequest, 500);
            });
        };

        tryRequest();
      });
    },
    /********************** requestAnimationFrame ********************************/
    // 1、requestAnimationFrame 会把每一帧中的所有 DOM 操作集中起来，在一次重绘或回流中就完成，并且重绘或回流的时间间隔紧紧跟随浏览器的刷新频率，一般来说，这个频率为每秒60帧。
    // 2、在隐藏或不可见的元素中，requestAnimationFrame 将不会进行重绘或回流，这当然就意味着更少的的 cpu，gpu 和内存使用量。
    requestAnimationFrame: (fn) => {
      if (!window.requestAnimationFrame) {
        window.requestAnimationFrame = window.requestAnimationFrame || window.mozRequestAnimationFrame || window.webkitRequestAnimationFrame;
      }
      window.requestAnimationFrame(fn)
    },
    dark: {},
  };

  // utils.dark.mode 当前模式 dark or light
  // utils.dark.toggle() 暗黑模式触发器
  // utils.dark.push(callBack[,"callBackName"]) 传入触发器回调函数
  utils.dark.method = {
    toggle: new RunItem(),
  };
  utils.dark = Object.assign(utils.dark, {
    push: utils.dark.method.toggle.push,
  });
</script>

  window.wrapLazyloadImages = (container) => {
    if (typeof container === 'string') {
      container = document.querySelector(container);
    }
    if (!container) return;
    
    const images = container.querySelectorAll('img');
    images.forEach((img) => {
      if (img.classList.contains('lazy')) return;

      const src = img.getAttribute('src');
      if (!src) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'lazy-box';

      const newImg = img.cloneNode();
      newImg.removeAttribute('src');
      newImg.setAttribute('data-src', src);
      newImg.classList.add('lazy');

      const icon = document.createElement('div');
      icon.className = 'lazy-icon';
      if (def.loading) {
        icon.style.backgroundImage = `url("${def.loading}")`;
      }

      wrapper.appendChild(newImg);
      wrapper.appendChild(icon);

      img.replaceWith(wrapper);
    });

    // 通知 LazyLoad 更新
    if (window.lazyLoadInstance?.update) {
      window.lazyLoadInstance.update();
    }
  }
  
</script>

<!-- 点击特效 -->
<script>
(function() {
  var clickEffects = {
    current: null,
    
    init: function() {
      this.current = localStorage.getItem('clickEffect') || 'none';
      this.bindEvents();
    },
    
    bindEvents: function() {
      var self = this;
      document.addEventListener('click', function(e) {
        if (self.current === 'none') return;
        if (e.target.closest('button, a, input, textarea, select, .post-card, .layout-btn')) return;
        self.createEffect(e.clientX, e.clientY);
      });
      
      window.addEventListener('storage', function(e) {
        if (e.key === 'clickEffect') {
          self.current = e.newValue || 'none';
        }
      });
    },
    
    createEffect: function(x, y) {
      switch(this.current) {
        case 'ripple': this.createRipple(x, y); break;
        case 'firework': this.createFirework(x, y); break;
        case 'particles': this.createParticles(x, y); break;
        case 'text': this.createText(x, y); break;
        default: break;
      }
    },
    
    createRipple: function(x, y) {
      var ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.cssText = 'position:fixed;left:' + x + 'px;top:' + y + 'px;width:0;height:0;border-radius:50%;background:rgba(52,152,219,0.4);transform:translate(-50%,-50%);pointer-events:none;z-index:9999;animation:rippleExpand 0.6s ease-out forwards;';
      document.body.appendChild(ripple);
      setTimeout(function() { ripple.remove(); }, 600);
    },
    
    createFirework: function(x, y) {
      var colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
      for (var i = 0; i < 12; i++) {
        var particle = document.createElement('div');
        var angle = (Math.PI * 2 / 12) * i;
        var velocity = 50 + Math.random() * 30;
        particle.style.cssText = 'position:fixed;left:' + x + 'px;top:' + y + 'px;width:6px;height:6px;border-radius:50%;background:' + colors[i % 5] + ';pointer-events:none;z-index:9999;transform:translate(-50%,-50%);';
        document.body.appendChild(particle);
        this.animateParticle(particle, x, y, x + Math.cos(angle) * velocity, y + Math.sin(angle) * velocity, 500);
      }
    },
    
    createParticles: function(x, y) {
      var colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd'];
      for (var i = 0; i < 8; i++) {
        var particle = document.createElement('div');
        particle.innerHTML = '✨';
        particle.style.cssText = 'position:fixed;left:' + (x + (Math.random()-0.5)*30) + 'px;top:' + (y + (Math.random()-0.5)*30) + 'px;font-size:16px;pointer-events:none;z-index:9999;animation:particleFloat 0.8s ease-out forwards;';
        document.body.appendChild(particle);
        setTimeout(function(p) { return function() { p.remove(); }; }(particle), 800);
      }
    },
    
    createText: function(x, y) {
      var texts = ['666', '厉害', 'nice', '棒', '赞', '给力'];
      var text = document.createElement('div');
      text.innerHTML = texts[Math.floor(Math.random() * texts.length)];
      text.style.cssText = 'position:fixed;left:' + x + 'px;top:' + y + 'px;font-size:18px;font-weight:bold;color:#3498db;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);animation:textFloat 0.8s ease-out forwards;';
      document.body.appendChild(text);
      setTimeout(function() { text.remove(); }, 800);
    },
    
    animateParticle: function(el, startX, startY, endX, endY, duration) {
      var startTime = performance.now();
      function animate(currentTime) {
        var progress = Math.min((currentTime - startTime) / duration, 1);
        var easeOut = 1 - Math.pow(1 - progress, 3);
        el.style.left = (startX + (endX - startX) * easeOut) + 'px';
        el.style.top = (startY + (endY - startY) * easeOut) + 'px';
        el.style.opacity = 1 - progress;
        if (progress < 1) requestAnimationFrame(animate);
        else el.remove();
      }
      requestAnimationFrame(animate);
    }
  };
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { clickEffects.init(); });
  } else {
    clickEffects.init();
  }
  
  window.ClickEffects = clickEffects;
})();
</script>
