<body>
  <div class="experience"></div>
  <div class="credits">My Room in 3D by <a href="https://bruno-simon.com" target="_blank">Bruno Simon</a> (<a href="https://github.com/brunosimon/my-room-in-3d" target="_blank">源代码</a>)</div>
  <script>
    const translations = {
      'baked': '烘焙光照',
      'uNightMix': '夜晚混合',
      'uNeutralMix': '中性混合',
      'tv': '电视',
      'uLightTvStrength': '电视灯光强度',
      'desk': '桌面',
      'uLightDeskStrength': '桌面灯光强度',
      'pc': '电脑',
      'uLightPcStrength': '电脑灯光强度',
      'googleLeds': 'Google LED',
      'color': '颜色',
      'loupedeckButtons': '控制台按钮',
      'coffeeSteam': '咖啡蒸汽',
      'uTimeFrequency': '时间频率',
      'bouncingLogo': '弹跳 Logo',
      'positionX': '位置X',
      'positionY': '位置Y',
      'positionZ': '位置Z',
      'scaleZ': '缩放Z',
      'scaleY': '缩放Y',
      'limitZMin': 'Z轴最小值',
      'limitZMax': 'Z轴最大值',
      'limitYMin': 'Y轴最小值',
      'limitYMax': 'Y轴最大值',
      'speedZ': 'Z轴速度',
      'speedY': 'Y轴速度'
    };

    function translateElement(el) {
      const text = el.textContent.trim();
      if (translations[text]) {
        el.textContent = translations[text];
        el.dataset.translated = 'true';
      }
    }

    function translateAll() {
      document.querySelectorAll('.tp-lblv_l:not([data-translated])').forEach(translateElement);
      document.querySelectorAll('.tp-dfv_t:not([data-translated])').forEach(translateElement);
    }

    function waitForGUI() {
      let attempts = 0;
      const maxAttempts = 50;
      
      const check = setInterval(() => {
        translateAll();
        attempts++;
        if (attempts >= maxAttempts) {
          clearInterval(check);
        }
      }, 200);

      setTimeout(translateAll, 100);
      setTimeout(translateAll, 500);
      setTimeout(translateAll, 1000);
      setTimeout(translateAll, 2000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', waitForGUI);
    } else {
      waitForGUI();
    }
  </script>
</body>
</html>
