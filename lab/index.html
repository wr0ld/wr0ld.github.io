<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前端实验室</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --card: rgba(16, 26, 43, 0.92);
      --card-hover: rgba(22, 35, 58, 0.98);
      --border: rgba(140, 180, 255, 0.14);
      --text: #f6f8ff;
      --text-soft: #9aa7bf;
      --accent: #4da3ff;
      --accent-2: #70e1c8;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(77, 163, 255, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(112, 225, 200, 0.12), transparent 26%),
        linear-gradient(180deg, #0a1424 0%, var(--bg) 100%);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(1400px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 64px 0 80px;
    }

    .hero {
      margin-bottom: 40px;
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(13, 23, 39, 0.96), rgba(16, 26, 43, 0.84));
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 1px solid rgba(112, 225, 200, 0.2);
      border-radius: 999px;
      color: var(--accent-2);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.02;
    }

    .hero-tips {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .hero-tip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-soft);
    }

    .hero-tip kbd {
      padding: 2px 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
    }

    .lab-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 1100px) {
      .lab-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .lab-grid { grid-template-columns: 1fr; }
    }

    .lab-card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .lab-card:hover {
      transform: translateY(-6px);
      background: var(--card-hover);
      border-color: rgba(140, 180, 255, 0.24);
    }

    .lab-preview {
      position: relative;
      height: 200px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #121f35, #1d2940);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lab-preview-icon {
      font-size: 48px;
      opacity: 0.6;
    }

    .lab-preview-gradient {
      position: absolute;
      inset: 0;
      opacity: 0.5;
    }

    .lab-preview-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .lab-preview-content .icon {
      font-size: 56px;
      margin-bottom: 8px;
    }

    .lab-preview-content .hint {
      font-size: 12px;
      color: var(--text-soft);
      opacity: 0.7;
    }

    .lab-info { padding: 20px; }
    .lab-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .lab-card-title { margin: 0; font-size: 20px; }
    .lab-card-version { font-size: 11px; color: var(--text-soft); opacity: 0.6; }

    .lab-card-desc {
      margin: 0 0 12px;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.7;
    }

    .lab-shortcuts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .lab-shortcut {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-soft);
    }

    .lab-shortcut kbd {
      padding: 2px 5px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
    }

    .lab-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .lab-tag {
      padding: 4px 8px;
      border: 1px solid rgba(140, 180, 255, 0.14);
      border-radius: 999px;
      color: #c6d3ea;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.04);
    }

    .lab-actions {
      display: flex;
      gap: 10px;
    }

    .lab-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .lab-btn:hover { transform: translateY(-1px); }
    .lab-btn-primary { background: linear-gradient(135deg, var(--accent), #2563eb); color: #fff; }
    .lab-btn-secondary { border-color: var(--border); background: transparent; color: var(--text); }

    .lab-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(4, 9, 16, 0.88);
      backdrop-filter: blur(10px);
      z-index: 9999;
    }

    .lab-modal.active { display: flex; }

    .lab-modal-content {
      width: min(1500px, 100%);
      height: min(900px, calc(100vh - 36px));
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: #09111f;
      box-shadow: var(--shadow);
      position: relative;
    }

    .lab-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
    }

    .lab-modal-title { font-size: 15px; font-weight: 600; }

    .lab-modal-close {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }

    .lab-modal-body { 
      height: calc(100% - 56px); 
      position: relative;
    }

    .lab-modal-body iframe { 
      width: 100%; 
      height: 100%; 
      border: 0; 
      background: #fff; 
    }

    .lab-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09111f;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    .lab-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .lab-loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .lab-loading-text {
      margin-top: 16px;
      color: var(--text-soft);
      font-size: 14px;
    }

    .lab-error {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09111f;
      z-index: 20;
    }

    .lab-error.active { display: flex; }

    .lab-error-icon { font-size: 48px; margin-bottom: 16px; }
    .lab-error-title { font-size: 18px; margin-bottom: 8px; }
    .lab-error-desc { color: var(--text-soft); font-size: 14px; text-align: center; max-width: 300px; }

    .mobile-notice {
      display: none;
      padding: 12px 16px;
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.3);
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #ffc107;
    }

    @media (max-width: 768px) {
      .mobile-notice { display: block; }
      .shell { width: min(100vw - 24px, 1400px); padding: 24px 0 40px; }
      .hero { padding: 24px; border-radius: 22px; }
      .lab-preview { height: 160px; }
      .lab-actions { flex-direction: column; }
      .lab-shortcuts { display: none; }
      .hero-tips { display: none; }
    }

    .lab-source-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--accent);
      opacity: 0.7;
      margin-top: 8px;
    }

    .lab-source-link:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="eyebrow">Frontend Lab</span>
      <h1>前端实验室</h1>
      <div class="hero-tips">
        <span class="hero-tip"><kbd>ESC</kbd> 退出全屏预览</span>
        <span class="hero-tip">点击「全屏预览」在当前页面查看</span>
        <span class="hero-tip">推荐使用桌面端浏览器访问</span>
      </div>
    </section>

    <div class="mobile-notice">
      ⚠️ 部分项目在移动端体验不佳，建议使用桌面端浏览器访问以获得最佳体验。
    </div>

    <section class="lab-grid" id="labGrid">
    </section>
  </main>

  <div class="lab-modal" id="labModal">
    <div class="lab-modal-content">
      <div class="lab-modal-header">
        <span class="lab-modal-title" id="labModalTitle">预览</span>
        <button class="lab-modal-close" type="button" onclick="closeLabModal()" aria-label="关闭">&times;</button>
      </div>
      <div class="lab-modal-body">
        <div class="lab-loading" id="labLoading">
          <div class="lab-loading-spinner"></div>
          <div class="lab-loading-text">正在加载项目...</div>
        </div>
        <div class="lab-error" id="labError">
          <div class="lab-error-icon">⚠️</div>
          <div class="lab-error-title">加载失败</div>
          <div class="lab-error-desc">项目加载失败，请尝试在新标签页中打开，或检查网络连接。</div>
        </div>
        <iframe id="labModalIframe" src="" title="实验预览"></iframe>
      </div>
    </div>
  </div>

  <script>
    var projects = [
      {
        id: 'pretext',
        title: 'Pretext 官方 Demos',
        desc: '多语言文本测量与布局实验集合，展示不依赖 DOM 实时测量的段落高度预测、瀑布流、富文本和障碍物绕排等能力。',
        url: '/lab/pretext/',
        gradient: 'linear-gradient(135deg, #667eea, #764ba2)',
        icon: '📝',
        tags: ['TypeScript', 'Text Layout', 'Performance'],
        shortcuts: [],
        version: '2025-01',
        source: ''
      },
      {
        id: 'login-animation',
        title: '卡通角色登录动画',
        desc: 'Vue 3 登录页面，包含卡通角色联动、眼睛跟随鼠标、随机眨眼和输入反馈。',
        url: '/lab/login-animation/',
        gradient: 'linear-gradient(135deg, #f093fb, #f5576c)',
        icon: '🐱',
        tags: ['Vue 3', 'Animation', 'Interactive'],
        shortcuts: ['鼠标移动控制眼睛'],
        version: '2025-01',
        source: ''
      },
      {
        id: 'my-room-in-3d',
        title: 'My Room in 3D',
        desc: 'Three.js 构建的交互式 3D 房间场景，支持日夜切换、鼠标拖拽旋转和滚轮缩放。',
        url: '/lab/my-room-in-3d/',
        gradient: 'linear-gradient(135deg, #4facfe, #00f2fe)',
        icon: '🏠',
        tags: ['Three.js', 'WebGL', '3D'],
        shortcuts: ['🖱️ 拖拽旋转', '⚙️ 滚轮缩放', '🌙 日夜切换'],
        version: '2025-01',
        source: ''
      },
      {
        id: 'bruno-simon-folio',
        title: 'Bruno Simon 3D Portfolio',
        desc: 'Three.js 大神经典作品集，可驾驶汽车在 3D 场景中探索，包含物理引擎和音效系统。',
        url: '/lab/bruno-simon-folio/',
        gradient: 'linear-gradient(135deg, #1a1a2e, #16213e)',
        icon: '🚗',
        tags: ['Three.js', 'Cannon.js', 'Physics'],
        shortcuts: ['W/A/S/D 移动', 'Space 跳跃', '🖱️ 控制方向'],
        version: '2025-01',
        source: 'https://github.com/brunosimon/folio'
      },
      {
        id: 'threejs-city',
        title: 'Three.js City',
        desc: '3D 城市驾驶模拟器，在随机生成的城市中行驶，支持雨滴效果和多摄像机视角。',
        url: '/lab/threejs-city/',
        gradient: 'linear-gradient(135deg, #2d3436, #636e72)',
        icon: '🏙️',
        tags: ['Three.js', 'City', 'Driving'],
        shortcuts: ['W/A/S/D 驾驶', 'C 切换视角', 'R 雨效果'],
        version: '2025-01',
        source: ''
      },
      {
        id: 'win11react',
        title: 'Windows 11 in React',
        desc: 'React 复刻的 Windows 11 桌面体验，包含开始菜单、任务栏、窗口拖拽、终端等。',
        url: '/lab/win11react/',
        gradient: 'linear-gradient(135deg, #0078d4, #00bcf2)',
        icon: '🪟',
        tags: ['React', 'Redux', 'Windows 11'],
        shortcuts: ['🖱️ 点击交互', '拖拽窗口'],
        version: '2025-01',
        source: 'https://github.com/blueedgetechno/win11React'
      },
      {
        id: 'liveterm',
        title: 'LiveTerm',
        desc: '终端风格的网站模板，支持命令行交互、多主题切换、Tab补全等功能。',
        url: '/lab/liveterm/',
        gradient: 'linear-gradient(135deg, #2E3440, #3B4252)',
        icon: '💻',
        tags: ['Next.js', 'Terminal UI', 'Tailwind'],
        shortcuts: ['Tab 补全', 'help 查看命令'],
        version: '2025-01',
        source: 'https://github.com/rajshekhar26/cleanfolio'
      },
      {
        id: 'infinite-world',
        title: 'Infinite World',
        desc: '无限程序化生成的 3D 世界，支持日夜循环、草地渲染、水面效果、第三人称控制。',
        url: '/lab/infinite-world/',
        gradient: 'linear-gradient(135deg, #11998e, #38ef7d)',
        icon: '🌍',
        tags: ['Three.js', 'WebGL', '程序化生成'],
        shortcuts: ['W/A/S/D 移动', 'Space 跳跃', '🖱️ 控制视角'],
        version: '2025-03',
        source: ''
      },
      {
        id: 'black-hole',
        title: 'WebGL Black Hole',
        desc: 'Three.js 实现的黑洞可视化效果，包含引力透镜、吸积盘、粒子系统和星空背景。',
        url: '/lab/black-hole/',
        gradient: 'linear-gradient(135deg, #0a0a0a, #1a1a2e)',
        icon: '🕳️',
        tags: ['Three.js', 'WebGL', 'Shaders'],
        shortcuts: ['🖱️ 旋转视角', '滚轮缩放', '调试面板调参'],
        version: '2025-04',
        source: 'https://github.com/brunosimon/webgl-black-hole'
      }
    ];

    function renderProjects() {
      var grid = document.getElementById('labGrid');
      var html = '';

      projects.forEach(function(project) {
        var shortcutsHtml = '';
        if (project.shortcuts && project.shortcuts.length > 0) {
          project.shortcuts.forEach(function(s) {
            shortcutsHtml += '<span class="lab-shortcut">' + s + '</span>';
          });
        }

        var sourceHtml = '';
        if (project.source) {
          sourceHtml = '<a class="lab-source-link" href="' + project.source + '" target="_blank" rel="noopener noreferrer">🔗 源代码</a>';
        }

        html += '<article class="lab-card">' +
          '<div class="lab-preview" style="background: ' + project.gradient + ';">' +
            '<div class="lab-preview-content">' +
              '<div class="icon">' + project.icon + '</div>' +
              '<div class="hint">点击预览</div>' +
            '</div>' +
          '</div>' +
          '<div class="lab-info">' +
            '<div class="lab-card-header">' +
              '<h2 class="lab-card-title">' + project.title + '</h2>' +
              '<span class="lab-card-version">' + project.version + '</span>' +
            '</div>' +
            '<p class="lab-card-desc">' + project.desc + '</p>' +
            (shortcutsHtml ? '<div class="lab-shortcuts">' + shortcutsHtml + '</div>' : '') +
            '<div class="lab-tags">' +
              project.tags.map(function(t) { return '<span class="lab-tag">' + t + '</span>'; }).join('') +
            '</div>' +
            '<div class="lab-actions">' +
              '<button class="lab-btn lab-btn-primary" type="button" onclick="openLabModal(\'' + project.url + '\', \'' + project.title + '\')">全屏预览</button>' +
              '<a class="lab-btn lab-btn-secondary" href="' + project.url + '" target="_blank" rel="noopener noreferrer">新标签打开</a>' +
            '</div>' +
            sourceHtml +
          '</div>' +
        '</article>';
      });

      grid.innerHTML = html;
    }

    function openLabModal(url, title) {
      var modal = document.getElementById("labModal");
      var loading = document.getElementById("labLoading");
      var error = document.getElementById("labError");
      var iframe = document.getElementById("labModalIframe");

      document.getElementById("labModalTitle").textContent = title;
      
      loading.classList.remove('hidden');
      error.classList.remove('active');
      iframe.src = '';
      
      modal.classList.add("active");
      document.body.style.overflow = "hidden";

      setTimeout(function() {
        iframe.src = url;
      }, 100);
    }

    function closeLabModal() {
      var modal = document.getElementById("labModal");
      var iframe = document.getElementById("labModalIframe");
      var loading = document.getElementById("labLoading");
      var error = document.getElementById("labError");

      modal.classList.remove("active");
      iframe.src = "";
      loading.classList.remove('hidden');
      error.classList.remove('active');
      document.body.style.overflow = "";
    }

    document.getElementById("labModal").addEventListener("click", function (event) {
      if (event.target === this) {
        closeLabModal();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeLabModal();
      }
    });

    var labModalIframe = document.getElementById("labModalIframe");
    var labLoading = document.getElementById("labLoading");
    var labError = document.getElementById("labError");

    labModalIframe.addEventListener("load", function() {
      labLoading.classList.add('hidden');
    });

    labModalIframe.addEventListener("error", function() {
      labLoading.classList.add('hidden');
      labError.classList.add('active');
    });

    var loadTimeout;
    var originalOpenLabModal = openLabModal;
    window.openLabModal = function(url, title) {
      clearTimeout(loadTimeout);
      originalOpenLabModal(url, title);
      
      loadTimeout = setTimeout(function() {
        if (!labLoading.classList.contains('hidden')) {
          labLoading.querySelector('.lab-loading-text').textContent = '加载时间较长，请耐心等待...';
        }
      }, 5000);
    };

    renderProjects();
  </script>
</body>
</html>
